<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 400px;
    }
    .ingredients-input {
        width: 100%;
        height: 100px;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }
    .generate-btn {
        width: 100%;
        padding: 10px;
        background-color: #28a745;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .generate-btn:hover {
        background-color: #218838;
    }
    .recipes {
        margin-top: 20px;
    }
</style>
<body>
    <div class="container">
        <h2>Leftover Recipe Generator </h2>
<p>Enter ingredients you already have</p>
        <textarea class="ingredients-input" placeholder="Enter ingredients..."></textarea>
        <button class="generate-btn">Generate Recipe</button>
        <div class="recipes"></div>
        <button onclick="saveRecipe('omelette')">❤️ Save</button>
        <div class="favorites"></div>
    </div>
</body>
<script src="recipe.js"></script>
</html>
