<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
    }
    .category {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        font-size: 16px;
    }
    .question {
        font-size: 18px;
        margin-bottom: 20px;
    }
    .answer-input {
        width: 100%;
        height: 150px;
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 20px;
        font-size: 16px;
    }
    .submit-btn, .next-btn {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
        margin-right: 10px;
    }
    .submit-btn:hover, .next-btn:hover {
        background-color: #0056b3;
    }
    .feedback {
        margin-top: 20px;
        font-size: 18px;
    }
    
</style>
<body>
    <div class="container">
        <select class="category">
    <option value="hr">HR</option>
    <option value="javascript">JavaScript</option>
    <option value="frontend">Frontend</option>
    <option value="behavioral">Behavioral</option>
</select>
       
        <div class="question"></div>

        <textarea class="answer-input" placeholder="Type your answer..."></textarea>

        <button class="submit-btn">Submit Answer</button>

        <button class="next-btn">Next Question</button>

        <div class="feedback"></div>
    </div>
</body>
<script src="interview.js"></script>
</html>
