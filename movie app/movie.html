<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 40px;
            text-align: center;
        }

        /* Search box */
        .search-box {
            position: sticky;
            top: 0;
            background: #f0f0f0;
            padding: 10px;
        }

        input {
            padding: 10px;
            width: 60%;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background-color: #555;
        }

        /* Results grid */
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        /* Movie card */
        .movie {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .movie:hover {
            transform: scale(1.05);
        }

        .movie img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 8px;
        }

        .movie h3 {
            font-size: 14px;
            margin: 10px 0 5px;
        }

        .movie p {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- ✅ Proper search wrapper -->
        <div class="search-box">
            <input type="text" placeholder="Search movie">
            <button>Search</button>
        </div>

        <!-- ✅ Only ONE results container -->
        <div class="results"></div>

    </div>

    <script src="movie.js"></script>
</body>
</html>
