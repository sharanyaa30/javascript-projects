<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial;
        background: #f0f0f0;
        display: flex;
        justify-content: center;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 400px;
        margin-top: 50px;
    }

    .input {
        width: 100%;
        height: 100px;
        margin-bottom: 20px;
    }

    .timer {
        font-size: 24px;
        margin-bottom: 20px;
    }

    .stats {
        display: flex;
        gap: 20px;
    }
    textarea {
        font-size: 18px;
        padding: 10px;
    }
</style>
<body>
    <div class="container">

        <p class="paragraph"></p>
        <textarea  class="input"></textarea>
        <div class="timer">60</div>
        <div class="stats">
            <span class="wpm">WPM: 0</span>
            <span class="accuracy">Accuracy: 0%</span>
        </div>
        <button class="reset">Reset</button>
    </div>
</body>
<script src="speed_test.js"></script>
</html>
