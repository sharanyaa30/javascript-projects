<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 400px;
    }
    .destination, .days, .weather {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }
    .generate-btn {
        width: 100%;
        padding: 10px;
        background-color: #28a745;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .generate-btn:hover {
        background-color: #218838;
    }
    .packing-list {
        margin-top: 20px;
    }
</style>
<body>
<div class="container">

    <h2>Travel Packing List Generator 🧳</h2>
    <p>Plan your trip essentials</p>

    <select class="destination">
        <option value="beach">Beach</option>
        <option value="mountains">Mountains</option>
        <option value="city">City</option>
        <option value="business">Business</option>
        <option value="adventure">Adventure</option>
        <option value="cruise">Cruise</option>
        <option value="ski">Ski Trip</option>
        <option value="tropical">Tropical</option>
        <option value="cultural">Cultural</option>
        <option value="roadtrip">Road Trip</option>
        <option value="adventure">Adventure</option>
        <option value="relaxation">Relaxation  </option>
    </select>

    <input type="number" class="days" placeholder="Number of days">

    <select class="weather">
        <option value="sunny">Sunny</option>
        <option value="rainy">Rainy</option>
        <option value="cold">Cold</option>
    </select>

    <button class="generate-btn">Generate Packing List</button>

    <div class="packing-list"></div>

</div>
</body>
<script src="travel.js"></script>
</html>
