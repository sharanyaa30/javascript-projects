<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            margin-top: 50px;
        }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            flex: 1;
        }

        button {
            padding: 8px;
            cursor: pointer;
        }

        .total {
            font-weight: bold;
            margin-bottom: 10px;
        }

        ul {
            list-style: none;
        }

        li {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            background: #eee;
            padding: 8px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="input-box">
        <input type="text" placeholder="Expense name" id="name">
        <input type="number" placeholder="Amount" id="amount">
        <button>Add</button>
    </div>

    <div class="total">Total: ₹0</div>

    <!-- IMPORTANT: this must exist -->
    <ul class="list"></ul>

</div>

<script src="expense.js"></script>
</body>
</html>
